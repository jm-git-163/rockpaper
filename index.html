<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>가위 바위 보 게임</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f0f0f0;
    transition: 0.3s;
}

.dark {
    background: #121212;
    color: white;
}

.top-buttons {
    position: absolute;
    top: 10px;
    right: 10px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
}

.scoreboard {
    font-size: 20px;
    margin: 15px;
}

.celebrate {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: red;
    animation: fall 2s linear infinite;
}

@keyframes fall {
    from { transform: translateY(-100px); }
    to { transform: translateY(100vh); }
}

table {
    margin: auto;
    border-collapse: collapse;
}

td, th {
    border: 1px solid black;
    padding: 8px;
}

canvas {
    max-width: 600px;
    margin: auto;
}
</style>
</head>

<body>

<div class="top-buttons">
<button onclick="toggleDark()">다크 모드</button>
<button onclick="toggleTable()">승률 보기</button>
</div>

<h1>가위 ✌️ 바위 ✊ 보 🖐</h1>

<div class="scoreboard">
내 점수: <span id="playerScore">0</span>  
컴퓨터 점수: <span id="computerScore">0</span>
</div>

<div>
<button onclick="play('가위')">가위</button>
<button onclick="play('바위')">바위</button>
<button onclick="play('보')">보</button>
</div>

<h2 id="result"></h2>

<button onclick="resetGame()">다시하기</button>

<div id="celebrate" class="celebrate"></div>

<br>

<div id="tableArea" style="display:none;">
<h2>승률 테이블</h2>

<table>
<tr>
<th>게임 수</th>
<th>승</th>
<th>패</th>
<th>무</th>
<th>승률</th>
</tr>

<tr>
<td id="total">0</td>
<td id="win">0</td>
<td id="lose">0</td>
<td id="draw">0</td>
<td id="rate">0%</td>
</tr>
</table>

<br>

<canvas id="chart"></canvas>

</div>

<script>

let playerScore = 0
let computerScore = 0

let total = 0
let win = 0
let lose = 0
let draw = 0

let history = []

let chart

function toggleDark() {
    document.body.classList.toggle("dark")
}

function toggleTable() {
    let area = document.getElementById("tableArea")

    if (area.style.display === "none") {
        area.style.display = "block"
        updateChart()
    } else {
        area.style.display = "none"
    }
}

function computerChoice() {
    let choices = ["가위","바위","보"]
    return choices[Math.floor(Math.random()*3)]
}

function play(player) {

    if (playerScore === 3 || computerScore === 3) return

    let computer = computerChoice()

    let result = ""

    if (player === computer) {
        result = "무승부"
        draw++
    }

    else if (
        (player === "가위" && computer === "보") ||
        (player === "바위" && computer === "가위") ||
        (player === "보" && computer === "바위")
    ) {
        result = "승리"
        playerScore++
        win++
    }

    else {
        result = "패배"
        computerScore++
        lose++
    }

    total++

    let rate = Math.round((win / total) * 100)

    history.push(rate)

    document.getElementById("playerScore").innerText = playerScore
    document.getElementById("computerScore").innerText = computerScore

    document.getElementById("result").innerText =
        "결과: " + result + " (컴퓨터: " + computer + ")"

    document.getElementById("total").innerText = total
    document.getElementById("win").innerText = win
    document.getElementById("lose").innerText = lose
    document.getElementById("draw").innerText = draw
    document.getElementById("rate").innerText = rate + "%"

    updateChart()

    if (playerScore === 3) {
        celebrate()
        alert("🎉 축하합니다! 당신이 이겼습니다!")
    }

    if (computerScore === 3) {
        alert("괜찮아요. 다음엔 이길 수 있습니다! 💪")
    }

}

function resetGame() {

    playerScore = 0
    computerScore = 0

    total = 0
    win = 0
    lose = 0
    draw = 0

    history = []

    document.getElementById("playerScore").innerText = 0
    document.getElementById("computerScore").innerText = 0

    document.getElementById("result").innerText = ""

    document.getElementById("total").innerText = 0
    document.getElementById("win").innerText = 0
    document.getElementById("lose").innerText = 0
    document.getElementById("draw").innerText = 0
    document.getElementById("rate").innerText = "0%"

    if (chart) {
        chart.destroy()
    }

}

function celebrate() {

    let container = document.getElementById("celebrate")

    for (let i = 0; i < 100; i++) {

        let confetti = document.createElement("div")

        confetti.className = "confetti"

        confetti.style.left = Math.random() * 100 + "%"

        confetti.style.background =
            "hsl(" + Math.random() * 360 + ",100%,50%)"

        container.appendChild(confetti)

        setTimeout(() => {
            confetti.remove()
        }, 2000)

    }

}

function updateChart() {

    let ctx = document.getElementById("chart")

    if (chart) {
        chart.destroy()
    }

    chart = new Chart(ctx, {

        type: "line",

        data: {

            labels: history.map((_, i) => i + 1),

            datasets: [{
                label: "승률 변화 (%)",
                data: history,
                fill: false
            }]

        },

        options: {

            scales: {

                y: {
                    min: 0,
                    max: 100
                }

            }

        }

    })

}

</script>

</body>
</html>
